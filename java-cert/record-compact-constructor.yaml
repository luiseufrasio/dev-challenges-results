last_code: |
  public record Person(String name, int age) {
      // Compact constructor must not use 'this.' to assign fields
      public Person {
          if (age < 0) age = 0;
          this.name = name;
      }
  
      public static void main(String[] args) {
          System.out.println(new Person("Bob", -5).age());
      }
  }
  
