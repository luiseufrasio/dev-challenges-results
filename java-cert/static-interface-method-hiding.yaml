  interface Flyer {
      public static void fly() {
          System.out.println("Flyer is flying");
      }
  }
  
  public class Bird implements Flyer {
      public void test() {
          fly();
      }
  
      public static void main(String[] args) {
          new Bird().test();
      }
  }
  
